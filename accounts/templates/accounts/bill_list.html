{% extends "accounts/base.html" %}
{% block content %}
<h2>Bills</h2>
<a href="{% url 'bill_create' %}">Create Bill</a>
<table>
    <tr><th>Unit</th><th>Month</th><th>Total Rent</th></tr>
    {% for bill in bills %}
    <tr>
        <td>{{ bill.unit }}</td>
        <td>{{ bill.month }}</td>
        <td>{{ bill.total_rent }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
